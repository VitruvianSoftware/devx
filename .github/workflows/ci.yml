name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check license headers
        run: |
          go install github.com/google/addlicense@latest
          addlicense -check -c "VitruvianSoftware" -l mit -ignore "docs/**" -ignore "internal/scaffold/templates/**" .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o devx-${{ matrix.goos }}-${{ matrix.goarch }} .

  validate-template:
    name: Validate Butane Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Butane template
        run: |
          CF_TUNNEL_TOKEN=dummy DEV_HOSTNAME=ci-test \
            envsubst < dev-machine.template.bu | \
            docker run --rm -i quay.io/coreos/butane:release --strict
