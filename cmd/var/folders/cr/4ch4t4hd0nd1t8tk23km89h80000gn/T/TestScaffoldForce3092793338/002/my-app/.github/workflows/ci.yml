name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: /var/folders/cr/4ch4t4hd0nd1t8tk23km89h80000gn/T/TestScaffoldForce3092793338/002/my_app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dev:dev@localhost:5432//var/folders/cr/4ch4t4hd0nd1t8tk23km89h80000gn/T/TestScaffoldForce3092793338/002/my_app_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run migrations
        run: psql $DATABASE_URL -f db/migrations/001_initial.sql
      - name: Run seeds
        run: psql $DATABASE_URL -f db/seeds/001_sample_data.sql
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null .
